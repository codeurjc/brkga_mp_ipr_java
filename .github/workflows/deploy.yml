name: Publish to Maven Central

# Publishes the wrapper (with bundled native binaries) to Maven Central when a
# version tag is pushed. Requires these repository SECRETS:
#   MAVEN_CENTRAL_USERNAME  - Sonatype Central token user
#   MAVEN_CENTRAL_TOKEN     - Sonatype Central token password
#   MAVEN_GPG_PRIVATE_KEY   - ASCII-armored GPG private key (no passphrase)
# The groupId io.github.codeurjc must be a namespace claimed/verified on
# Sonatype Central before the first run.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_TOKEN
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      - name: Install native toolchain
        run: sudo apt-get update && sudo apt-get install -y g++ make
      - name: Deploy
        working-directory: brkga_mp_ipr_java
        run: mvn -B -Prelease deploy
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
