name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # the upstream C++ library lives in third_party/
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Install native toolchain
        run: sudo apt-get update && sudo apt-get install -y g++ make
      - name: Build and test the wrapper
        working-directory: brkga_mp_ipr_java
        run: mvn -B test
